# ─────────────────────────────────────────────────────────────────────────────
# CoreCold — Nginx reverse proxy
#   • Serves the built static frontend (Vite `dist/`)
#   • Forwards /api/* to the Node API (PM2) on 127.0.0.1:4000
#
# Install:  copy to /etc/nginx/sites-available/corecold.conf
#           ln -s /etc/nginx/sites-available/corecold.conf /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: build the frontend with Vite `base: '/'` for a root-domain deploy, or the
#       hashed asset URLs will 404 (vite.config.js currently uses a subpath base).
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS — replace with your real certificate paths ──
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;   # REPLACE
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;     # REPLACE
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Built frontend ──
    root  /var/www/corecold/dist;   # REPLACE: path to the Vite build output
    index index.html;

    client_max_body_size 1m;

    # Security headers for the STATIC site (the API is hardened separately by
    # Helmet). nginx add_header does NOT inherit into locations that set their
    # own headers, so repeat these there if you add per-location headers.
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ── API → Node / PM2 ──
    # IMPORTANT: no trailing slash on proxy_pass, so the full "/api/..." path is
    # preserved (the Express routes are mounted under /api).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # → real client IP for rate limiting
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Long-cache hashed build assets ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: client-side routes (/admin, /reset-password, …) → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
